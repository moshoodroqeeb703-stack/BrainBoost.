    try{ const today=new Date().toDateString(); return parseInt(localStorage.getItem(`bb_d_${email}_${today}`)||"0"); }catch{return 0;}
  },
  incDailyUsed:(email)=>{
    try{
      const today=new Date().toDateString();
      const k=`bb_d_${email}_${today}`;
      const n=parseInt(localStorage.getItem(k)||"0")+1;
      localStorage.setItem(k,n); return n;
    }catch{return 0;}
  },
  getMessages:(email)=>{
    try{ return JSON.parse(localStorage.getItem(`bb_msgs_${email}`)||"null"); }catch{return null;}
  },
  saveMessages:(email,msgs)=>{
    try{ localStorage.setItem(`bb_msgs_${email}`,JSON.stringify(msgs.slice(-50))); }catch{}
  },
};

// ══════════════════════════════════════
// IMAGE SEARCH - Wikipedia (FREE!)
// ══════════════════════════════════════
const searchImage = async (query) => {
  try {
    const clean = query
      .replace(/diagram|picture|image|show me|draw|of|what does|look like|photo|sketch/gi,"")
      .trim();
    if (!clean) return null;
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(clean)}`;
    const res = await fetch(url);
    const data = await res.json();
    return data.thumbnail?.source || null;
  } catch { return null; }
};

const wantsImage = (q) => {
  const lower = q.toLowerCase();
  return lower.includes("diagram") || lower.includes("picture") ||
         lower.includes("image") || lower.includes("show me") ||
         lower.includes("draw") || lower.includes("photo") ||
         lower.includes("what does") || lower.includes("look like") ||
         lower.includes("sketch");
};

// ══════════════════════════════════════
// DETECT QUESTION TYPE
// ══════════════════════════════════════
const wantsExplanation = (q) => {
  const lower = q.toLowerCase();
  return lower.includes("explain") || lower.includes("how does") ||
         lower.includes("tell me more") || lower.includes("elaborate") ||
         lower.includes("in detail") || lower.includes("describe") ||
         lower.includes("why") || lower.includes("how do") ||
         lower.includes("what happens") || lower.includes("break it down") ||
         lower.includes("step by step") || lower.includes("steps");
};

const wantsCode = (q) => {
  const lower = q.toLowerCase();
  return lower.includes("code") || lower.includes("program") ||
         lower.includes("function") || lower.includes("write") ||
         lower.includes("python") || lower.includes("javascript") ||
         lower.includes("java") || lower.includes("c++") ||
         lower.includes("algorithm") || lower.includes("syntax");
};

const wantsEssay = (q) => {
  const lower = q.toLowerCase();
  return lower.includes("essay") || lower.includes("write about") ||
         lower.includes("composition") || lower.includes("article") ||
         lower.includes("paragraph");
};

const buildPrompt = (question) => {
  if (wantsCode(question)) {
    return `You are BrainBoost AI for Nigerian students. 
The student wants code. Give COMPLETE working code with brief comments.
Use emojis. End with "✅ Copy and run this code!"
Question: ${question}`;
  }

  if (wantsEssay(question)) {
    return `You are BrainBoost AI for Nigerian students.
The student wants an essay. Write a COMPLETE, STRUCTURED essay with Introduction, Body paragraphs, and Conclusion.
Use proper academic language. Include relevant facts.
End with "✅ This essay is unique for you - safe from plagiarism!"
Question: ${question}`;
  }

  if (wantsExplanation(question)) {
    return `You are BrainBoost AI for Nigerian students (WAEC, NECO, university level).
The student wants a DETAILED explanation. Give a thorough, step-by-step response.
Use emojis, examples, and clear headings.
End with "✅ This explanation is accurate and unique for you!"
Question: ${question}`;
  }

  // DEFAULT: Short, direct answer only!
  return `You are BrainBoost AI for Nigerian students.
Give a SHORT, DIRECT answer only. Like a dictionary definition.
DO NOT over-explain. Just answer the question directly in 1-3 sentences maximum.
If it's a math problem, solve it directly showing just the answer and key steps.
Use emojis. End with "💡 Ask me to explain more if you want details!"
Question: ${question}`;
};

// ══════════════════════════════════════
// CALL AI SERVER
// ══════════════════════════════════════
const askAI = async (question) => {
  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, prompt: buildPrompt(question) })
    });
    const data = await response.json();
    if (!response.ok) return `❌ Error: ${data.error || "Please try again!"}`;
    return data.answer;
  } catch (error) {
    return `❌ Connection error. Check internet!\n\nError: ${error.message}`;
  }
};

function Btn({ children, onClick, variant="primary", sm, full, disabled }) {

  const v = {
    primary:{ background:"linear-gradient(135deg,#7C3AED,#a855f7)", color:"#fff", boxShadow:"0 8px 24px rgba(124,58,237,0.3)" },
    gold:{ background:"linear-gradient(135deg,#F59E0B,#d97706)", color:"#fff" },
    ghost:{ background:"rgba(124,58,237,0.1)", color:"#7C3AED", border:"1px solid rgba(124,58,237,0.4)" },
    muted:{ background:"rgba(240,244,248,0.05)", color:C.muted, border:`1px solid ${C.border}` },
    red:{ background:"rgba(239,68,68,0.1)", color:"#ef4444", border:"1px solid rgba(239,68,68,0.3)" },
  };
  return <button disabled={disabled} onClick={onClick} style={{...base,...v[variant]}}>{children}</button>;
}

function Tag({ children, color="#7C3AED" }) {
  return <span style={{ background:`${color}20`, color, border:`1px solid ${color}40`, borderRadius:20, padding:"3px 11px", fontSize:11, fontWeight:700 }}>{children}</span>;
}

        <div style={{ marginBottom:16 }}>
          <label style={{ fontSize:11, color:C.muted, fontWeight:700 }}>PASSWORD</label>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Min 6 characters" style={inp} onKeyPress={e=>e.key==="Enter"&&submit()} />
        </div>

        {mode==="signup"&&(
          <div style={{ marginBottom:16, display:"flex", alignItems:"flex-start", gap:10 }}>
            <input type="checkbox" id="agree" checked={agreed} onChange={e=>setAgreed(e.target.checked)}
              style={{ marginTop:2, cursor:"pointer", width:16, height:16, accentColor:"#7C3AED" }} />
            <label htmlFor="agree" style={{ fontSize:12, color:C.sub, cursor:"pointer", lineHeight:1.5 }}>
              I agree to BrainBoost's{" "}
              <span onClick={onPrivacy} style={{ color:"#7C3AED", textDecoration:"underline", fontWeight:700 }}>
                Privacy Policy & Terms of Use
              </span>
              . I will not misuse this platform.
            </label>
          </div>
        )}

        {err&&<div style={{ color:C.gold, fontSize:12, marginBottom:14, textAlign:"center", background:`${C.gold}10`, padding:10, borderRadius:8, border:`1px solid ${C.gold}30` }}>{err}</div>}

        <Btn onClick={submit} full>{mode==="login"?"Log In →":"Create Account →"}</Btn>

        <div style={{ textAlign:"center", marginTop:16, fontSize:13, color:C.muted }}>
          {mode==="login"?"No account? ":"Have account? "}
          <span onClick={onSwitch} style={{ color:"#7C3AED", cursor:"pointer", fontWeight:700 }}>
            {mode==="login"?"Sign up free":"Log in"}
          </span>
        </div>
        <div style={{ textAlign:"center", marginTop:10 }}>
          <span onClick={onBack} style={{ fontSize:12, color:C.muted, cursor:"pointer" }}>← Back</span>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// CHAT PAGE
// ══════════════════════════════════════
function Chat({ user, onLogout, onPrivacy }) {
  const chatKey = `bb_msgs_${user.email}`;

  const welcomeMsg = { role:"ai", text:`Hi ${user.name}! 👋 I'm BrainBoost AI 🧠\n\nI give SHORT answers by default.\nAdd "explain" or "in detail" for full explanations!\n\nExamples:\n❓ "What is physics?" → Short definition\n📖 "Explain photosynthesis" → Full detail\n🖼️ "Show me diagram of rabbit" → Image + info\n💻 "Write Python code for..." → Full code\n📝 "Essay on climate change" → Full essay\n🔢 "What is sin(45°)?" → Quick answer\n\nAsk me anything! 🚀` };

  const [messages, setMessages] = React.useState(()=>{
    const saved = DB.getMessages(user.email);
    return saved || [welcomeMsg];
  });

  React.useEffect(()=>{
    DB.saveMessages(user.email, messages);
  }, [messages]);

  const [input, setInput] = React.useState("");
  const [dailyUsed, setDailyUsed] = React.useState(()=>DB.getDailyUsed(user.email));
  const [loading, setLoading] = React.useState(false);
  const [showPayment, setShowPayment] = React.useState(false);
  const messagesEnd = React.useRef(null);

  const isPro = user.plan!=="free"||user.isOwner;
  const dailyLimit = isPro?9999:10;
  const remaining = dailyLimit-dailyUsed;

  React.useEffect(()=>{ messagesEnd.current?.scrollIntoView({behavior:"smooth"}); },[messages,loading]);

  const handleSend = async () => {
    if (!input.trim()||loading) return;
    if (!isPro&&remaining<=0){setShowPayment(true);return;}

    const userMsg = input;
    setMessages(prev=>[...prev,{role:"user",text:userMsg}]);
    setInput("");
    setLoading(true);

    // Check if user wants image
    let imageUrl = null;
    if (wantsImage(userMsg)) {
      imageUrl = await searchImage(userMsg);
    }

    const aiResponse = await askAI(userMsg);
    setMessages(prev=>[...prev,{role:"ai",text:aiResponse,image:imageUrl}]);
    const n=DB.incDailyUsed(user.email);
    setDailyUsed(n);
    setLoading(false);
  };

  const clearChat = () => {
    DB.saveMessages(user.email, [welcomeMsg]);
    setMessages([welcomeMsg]);
  };

  return (
    <div style={{ width:"100%", height:"100vh", background:C.bg, display:"flex", flexDirection:"column", color:C.text, fontFamily:"'Outfit',sans-serif" }}>
      {showPayment&&<PaymentModal onClose={()=>setShowPayment(false)} />}

      {/* NAV */}
      <nav style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"0 16px", height:58, display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:800, color:"#7C3AED" }}>🧠 BrainBoost</span>
          <Tag color={user.isOwner?C.gold:isPro?C.teal:C.muted}>{user.isOwner?"OWNER":isPro?"PRO":"FREE"}</Tag>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          {!isPro&&<div onClick={()=>setShowPayment(true)} style={{ fontSize:12, color:remaining<=2?C.gold:C.sub, fontWeight:700, padding:"5px 10px", background:remaining<=2?`${C.gold}15`:"rgba(124,58,237,0.08)", borderRadius:8, cursor:"pointer" }}>{remaining} left</div>}
          {!isPro&&<Btn variant="ghost" sm onClick={()=>setShowPayment(true)}>⬆️ Pro</Btn>}
          <Btn variant="muted" sm onClick={clearChat}>🗑️</Btn>
          <Btn variant="muted" sm onClick={onLogout}>Out</Btn>
        </div>
      </nav>

      {/* MESSAGES */}
      <div style={{ flex:1, overflowY:"auto", padding:"16px", maxWidth:860, margin:"0 auto", width:"100%" }}>
        {messages.map((msg,i)=>(
          <div key={i} style={{ marginBottom:16 }} className="fade-in">
            {msg.role==="user"?(
              <div style={{ display:"flex", justifyContent:"flex-end" }}>
                <div style={{ background:"linear-gradient(135deg,#7C3AED,#a855f7)", color:"#fff", borderRadius:"16px 16px 4px 16px", padding:"12px 16px", maxWidth:"75%", fontSize:14, lineHeight:1.65, whiteSpace:"pre-wrap", wordWrap:"break-word" }}>{msg.text}</div>
              </div>
            ):(
              <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                <div style={{ width:34, height:34, background:"linear-gradient(135deg,#7C3AED,#F59E0B)", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>🧠</div>
                <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:"4px 16px 16px 16px", padding:"12px 16px", maxWidth:"82%", fontSize:14, lineHeight:1.75, whiteSpace:"pre-wrap", wordWrap:"break-word", color:C.text }}>
                  {msg.image&&(
                    <div style={{ marginBottom:10 }}>
                      <img src={msg.image} alt="diagram"
                        style={{ width:"100%", maxWidth:280, borderRadius:10, border:`1px solid ${C.border}`, display:"block" }}
                        onError={e=>e.target.style.display="none"} />
                      <div style={{ fontSize:11, color:C.muted, marginTop:4 }}>📸 Image from Wikipedia</div>
                    </div>
                  )}
                  {msg.text}
                </div>
              </div>
            )}
          </div>
        ))}

        {loading&&(
          <div style={{ display:"flex", gap:10, alignItems:"flex-start", marginBottom:16 }}>
            <div style={{ width:34, height:34, background:"linear-gradient(135deg,#7C3AED,#F59E0B)", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🧠</div>
            <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:"4px 16px 16px 16px", padding:"14px 18px", display:"flex", gap:6, alignItems:"center" }}>
              <div className="d1" style={{ width:8, height:8, borderRadius:"50%", background:"#7C3AED" }} />
              <div className="d2" style={{ width:8, height:8, borderRadius:"50%", background:"#7C3AED" }} />
              <div className="d3" style={{ width:8, height:8, borderRadius:"50%", background:"#7C3AED" }} />
            </div>
          </div>
        )}
        <div ref={messagesEnd} />
      </div>

      {/* REVVO AD */}
      <div style={{ padding:"0 16px 8px", maxWidth:860, margin:"0 auto", width:"100%" }}>
        <div style={{ background:"linear-gradient(135deg,rgba(124,58,237,0.08),rgba(245,158,11,0.08))", border:"1px solid rgba(245,158,11,0.25)", borderRadius:12, padding:"10px 14px", display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ fontSize:18 }}>💰</div>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700, fontSize:12, color:C.gold }}>Sell Online? Track Revenue with Revvo ⚡</div>
            <div style={{ fontSize:11, color:C.sub }}>Free analytics for Shopify sellers</div>
          </div>
          <Btn variant="ghost" sm onClick={()=>window.open("https://finance-dashboard--moshoodroqeeb.replit.app","_blank")}>Try →</Btn>
        </div>
      </div>

      {/* QUICK SUGGESTIONS */}
      <div style={{ padding:"0 16px 8px", maxWidth:860, margin:"0 auto", width:"100%", display:"flex", gap:8, flexWrap:"wrap" }}>
        {["Explain photosynthesis","Show me diagram of heart","Write Python code","Essay on climate change"].map((s,i)=>(
          <div key={i} onClick={()=>setInput(s)}
            style={{ fontSize:11, color:C.sub, background:C.card, border:`1px solid ${C.border}`, borderRadius:20, padding:"5px 12px", cursor:"pointer", transition:"all 0.2s" }}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#7C3AED"}
            onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
            {s}
          </div>
        ))}
      </div>

      {/* INPUT */}
      <div style={{ borderTop:`1px solid ${C.border}`, background:C.surface, padding:"12px 16px", flexShrink:0 }}>
        <div style={{ maxWidth:860, margin:"0 auto", width:"100%", display:"flex", gap:10, alignItems:"center" }}>
          <input type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==="Enter"&&handleSend()}
            placeholder={!isPro&&remaining===0?"Upgrade to continue...":"Ask anything or say 'explain...' for details"}
            disabled={loading||(!isPro&&remaining<=0)}
            style={{ flex:1, background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:"12px 16px", color:C.text, fontFamily:"'Outfit',sans-serif", fontSize:14, outline:"none", opacity:loading||(!isPro&&remaining<=0)?0.6:1 }} />
          <button onClick={handleSend} disabled={loading||!input.trim()||(!isPro&&remaining<=0)}
            style={{ width:46, height:46, background:"linear-gradient(135deg,#7C3AED,#a855f7)", border:"none", borderRadius:12, cursor:"pointer", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center", opacity:loading||!input.trim()?0.5:1, flexShrink:0, color:"#fff" }}>→</button>
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:6, maxWidth:860, margin:"6px auto 0" }}>
          {!isPro&&<span onClick={()=>setShowPayment(true)} style={{ fontSize:11, color:"#7C3AED", cursor:"pointer", fontWeight:700 }}>
            {remaining===0?"Daily limit • Upgrade ₦5,000/month":`${remaining} questions left • Upgrade for unlimited`}
          </span>}
          <span onClick={onPrivacy} style={{ fontSize:11, color:C.muted, cursor:"pointer", marginLeft:"auto" }}>🔒 Privacy Policy</span>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════
function App() {
  const [screen, setScreen] = React.useState("loading");
  const [user, setUser] = React.useState(null);
  const [showPrivacy, setShowPrivacy] = React.useState(false);

  React.useEffect(()=>{
    const session=DB.getSession();
    if (session){setUser(session);setScreen("chat");}
    else{setScreen("landing");}
  },[]);

  const login=u=>{setUser(u);setScreen("chat");};
  const logout=()=>{DB.clearSession();setUser(null);setScreen("landing");};

  return (
    <>
      {showPrivacy&&<PrivacyModal onClose={()=>setShowPrivacy(false)} />}
      {screen==="loading"&&(
        <div style={{ width:"100%", height:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:50, marginBottom:16 }}>🧠</div>
            <div style={{ color:"#7C3AED", fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:800 }}>BrainBoost</div>
          </div>
        </div>
      )}
      {screen==="landing"&&<Landing onLogin={()=>setScreen("login")} onSignup={()=>setScreen("signup")} onPrivacy={()=>setShowPrivacy(true)} />}
      {screen==="login"&&<AuthPage mode="login" onAuth={login} onSwitch={()=>setScreen("signup")} onBack={()=>setScreen("landing")} onPrivacy={()=>setShowPrivacy(true)} />}
      {screen==="signup"&&<AuthPage mode="signup" onAuth={login} onSwitch={()=>setScreen("login")} onBack={()=>setScreen("landing")} onPrivacy={()=>setShowPrivacy(true)} />}
      {screen==="chat"&&<Chat user={user} onLogout={logout} onPrivacy={()=>setShowPrivacy(true)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
