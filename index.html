const DB = {

    try{ const today=new Date().toDateString(); return parseInt(localStorage.getItem(`bb_d_${email}_${today}`)||"0"); }catch{return 0;}
  },
  incDailyUsed:(email)=>{
    try{
      const today=new Date().toDateString();
      const k=`bb_d_${email}_${today}`;
      const n=parseInt(localStorage.getItem(k)||"0")+1;
      localStorage.setItem(k,n); return n;
    }catch{return 0;}
  },
};

// FREE IMAGE SEARCH - Wikipedia
const searchImage = async (query) => {
  try {
    const search = query.replace(/diagram|picture|image|show me|draw|of/gi,"").trim();
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(search)}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.thumbnail?.source) {
      return data.thumbnail.source;
    }
    return null;
  } catch {
    return null;
  }
};

// Check if user wants an image
const wantsImage = (question) => {
  const q = question.toLowerCase();
  return q.includes("diagram") ||
         q.includes("picture") ||
         q.includes("image") ||
         q.includes("show me") ||
         q.includes("draw") ||
         q.includes("photo") ||
         q.includes("what does") ||
         q.includes("look like");
};
const askAI = async (question) => {
  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });

    const data = await response.json();

    if (!response.ok) {
      return `❌ Error: ${data.error || "Please try again!"}`;
    }

    return data.answer;

  } catch (error) {
    return `❌ Connection error. Check internet and try again!\n\nError: ${error.message}`;
  }
};

function Btn({ children, onClick, variant="primary", sm, full, disabled }) {
  const base = { borderRadius:12, padding:sm?"8px 16px":"12px 24px", fontFamily:"'Outfit',sans-serif", fontWeight:700, fontSize:sm?13:14, cursor:disabled?"not-allowed":"pointer", opacity:disabled?0.5:1, border:"none", transition:"all 0.2s", width:full?"100%":"auto", whiteSpace:"nowrap" };
  const v = {
    primary:{ background:"linear-gradient(135deg,#7C3AED,#a855f7)", color:"#fff", boxShadow:"0 8px 24px rgba(124,58,237,0.3)" },
    gold:{ background:"linear-gradient(135deg,#F59E0B,#d97706)", color:"#fff" },
    ghost:{ background:"rgba(124,58,237,0.1)", color:"#7C3AED", border:"1px solid rgba(124,58,237,0.4)" },
    muted:{ background:"rgba(240,244,248,0.05)", color:C.muted, border:`1px solid ${C.border}` },
  };
  return <button disabled={disabled} onClick={onClick} style={{...base,...v[variant]}}>{children}</button>;
}

              <div className="d3" style={{ width:8, height:8, borderRadius:"50%", background:"#7C3AED" }} />
            </div>
          </div>
        )}
        <div ref={messagesEnd} />
      </div>
      <div style={{ padding:"0 16px 10px", maxWidth:860, margin:"0 auto", width:"100%" }}>
        <div style={{ background:"linear-gradient(135deg,rgba(124,58,237,0.08),rgba(245,158,11,0.08))", border:"1px solid rgba(245,158,11,0.25)", borderRadius:12, padding:"10px 14px", display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ fontSize:18 }}>💰</div>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700, fontSize:12, color:C.gold }}>Sell Online? Track Revenue with Revvo ⚡</div>
            <div style={{ fontSize:11, color:C.sub }}>Free analytics for Shopify sellers</div>
          </div>
          <Btn variant="ghost" sm onClick={()=>window.open("https://finance-dashboard--moshoodroqeeb.replit.app","_blank")}>Try →</Btn>
        </div>
      </div>
      <div style={{ borderTop:`1px solid ${C.border}`, background:C.surface, padding:"12px 16px", flexShrink:0 }}>
        <div style={{ maxWidth:860, margin:"0 auto", width:"100%", display:"flex", gap:10, alignItems:"center" }}>
          <input type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==="Enter"&&handleSend()}
            placeholder={!isPro&&remaining===0?"Upgrade to continue...":"Ask anything - maths, science, coding, essays..."}
            disabled={loading||(!isPro&&remaining<=0)}
            style={{ flex:1, background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:"12px 16px", color:C.text, fontFamily:"'Outfit',sans-serif", fontSize:14, outline:"none", opacity:loading||(!isPro&&remaining<=0)?0.6:1 }} />
          <button onClick={handleSend} disabled={loading||!input.trim()||(!isPro&&remaining<=0)}
            style={{ width:46, height:46, background:"linear-gradient(135deg,#7C3AED,#a855f7)", border:"none", borderRadius:12, cursor:"pointer", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center", opacity:loading||!input.trim()?0.5:1, flexShrink:0, color:"#fff" }}>→</button>
        </div>
        {!isPro&&<div style={{ fontSize:11, color:C.muted, textAlign:"center", marginTop:8 }}>
          <span onClick={()=>setShowPayment(true)} style={{ color:"#7C3AED", cursor:"pointer", fontWeight:700 }}>
            {remaining===0?"Daily limit • Upgrade ₦5,000/month":`${remaining} left today • Upgrade for unlimited`}
          </span>
        </div>}
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = React.useState("loading");
  const [user, setUser] = React.useState(null);

  React.useEffect(()=>{
    const session=DB.getSession();
    if (session){setUser(session);setScreen("chat");}
    else{setScreen("landing");}
  },[]);

  const login=u=>{setUser(u);setScreen("chat");};
  const logout=()=>{DB.clearSession();setUser(null);setScreen("landing");};

  if (screen==="loading") return (
    <div style={{ width:"100%", height:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:50, marginBottom:16 }}>🧠</div>
        <div style={{ color:C.purple, fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:800 }}>BrainBoost</div>
      </div>
    </div>
  );

  if (screen==="landing") return <Landing onLogin={()=>setScreen("login")} onSignup={()=>setScreen("signup")} />;
  if (screen==="login") return <AuthPage mode="login" onAuth={login} onSwitch={()=>setScreen("signup")} onBack={()=>setScreen("landing")} />;
  if (screen==="signup") return <AuthPage mode="signup" onAuth={login} onSwitch={()=>setScreen("login")} onBack={()=>setScreen("landing")} />;
  if (screen==="chat") return <Chat user={user} onLogout={logout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
