<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BrainBoost 🧠 - AI Learning Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0F172A;font-family:'Outfit',sans-serif;color:#F0F4F8;}
#root{min-height:100vh;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 22px;border-radius:12px;font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;cursor:pointer;border:none;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,#7C3AED,#a855f7);color:#fff;box-shadow:0 6px 20px rgba(124,58,237,0.35);}
.btn-primary:hover{transform:translateY(-2px);}
.btn-ghost{background:rgba(124,58,237,0.1);color:#7C3AED;border:1px solid rgba(124,58,237,0.4);}
.btn-gold{background:linear-gradient(135deg,#F59E0B,#d97706);color:#fff;}
.btn-muted{background:rgba(255,255,255,0.05);color:rgba(240,244,248,0.5);border:1px solid rgba(124,58,237,0.2);}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:10px;}
.btn-full{width:100%;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}

/* TAG */
.tag{display:inline-flex;align-items:center;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;}

/* PAGES */
.page{width:100%;min-height:100vh;display:flex;flex-direction:column;}
.hidden{display:none!important;}

/* CARD */
.card{background:#1F3559;border:1px solid rgba(124,58,237,0.2);border-radius:16px;padding:24px;}

/* INPUT */
.input-field{width:100%;background:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.2);border-radius:10px;padding:12px 14px;color:#F0F4F8;font-family:'Outfit',sans-serif;font-size:14px;outline:none;margin-top:6px;}
.input-field:focus{border-color:#7C3AED;}
.input-label{font-size:11px;color:rgba(240,244,248,0.5);font-weight:700;letter-spacing:0.5px;}

/* NAV */
.nav{background:#1A2847;border-bottom:1px solid rgba(124,58,237,0.2);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-brand{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:20px;font-weight:800;}
.nav-logo{width:38px;height:38px;background:linear-gradient(135deg,#7C3AED,#F59E0B);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}

/* CHAT */
.chat-wrap{flex:1;overflow-y:auto;padding:16px;max-width:840px;margin:0 auto;width:100%;}
.msg-user{display:flex;justify-content:flex-end;margin-bottom:14px;}
.msg-ai{display:flex;gap:10px;margin-bottom:14px;align-items:flex-start;}
.bubble-user{background:linear-gradient(135deg,#7C3AED,#a855f7);color:#fff;border-radius:16px 16px 4px 16px;padding:12px 16px;max-width:75%;font-size:14px;line-height:1.65;white-space:pre-wrap;word-wrap:break-word;}
.bubble-ai{background:#1F3559;border:1px solid rgba(124,58,237,0.2);border-radius:4px 16px 16px 16px;padding:12px 16px;max-width:82%;font-size:14px;line-height:1.75;white-space:pre-wrap;word-wrap:break-word;}
.ai-avatar{width:34px;height:34px;background:linear-gradient(135deg,#7C3AED,#F59E0B);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}

/* TYPING DOTS */
@keyframes blink{0%,100%{opacity:0.2}50%{opacity:1}}
.dot{width:8px;height:8px;border-radius:50%;background:#7C3AED;display:inline-block;}
.dot:nth-child(1){animation:blink 1.4s infinite 0s;}
.dot:nth-child(2){animation:blink 1.4s infinite 0.2s;}
.dot:nth-child(3){animation:blink 1.4s infinite 0.4s;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;backdrop-filter:blur(10px);}
.modal-box{background:#1F3559;border:1px solid rgba(124,58,237,0.3);border-radius:20px;padding:30px 24px;width:100%;max-width:660px;}

/* FADE IN */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.4s ease;}

/* DIAGRAMS */
.diagram-img{width:100%;max-width:280px;border-radius:10px;border:1px solid rgba(124,58,237,0.3);display:block;margin-bottom:10px;}
.diagram-source{font-size:11px;color:rgba(240,244,248,0.4);margin-bottom:8px;}

/* SUGGESTIONS */
.suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 8px;max-width:840px;margin:0 auto;width:100%;}
.suggestion-chip{font-size:11px;color:rgba(240,244,248,0.6);background:#1F3559;border:1px solid rgba(124,58,237,0.2);border-radius:20px;padding:5px 12px;cursor:pointer;}
.suggestion-chip:hover{border-color:#7C3AED;color:#F0F4F8;}

/* CHAT INPUT BAR */
.input-bar{border-top:1px solid rgba(124,58,237,0.2);background:#1A2847;padding:12px 16px;}
.input-row{max-width:840px;margin:0 auto;display:flex;gap:10px;align-items:center;}
.chat-input{flex:1;background:#1F3559;border:1px solid rgba(124,58,237,0.2);border-radius:12px;padding:12px 16px;color:#F0F4F8;font-family:'Outfit',sans-serif;font-size:14px;outline:none;}
.chat-input:focus{border-color:#7C3AED;}
.send-btn{width:46px;height:46px;background:linear-gradient(135deg,#7C3AED,#a855f7);border:none;border-radius:12px;color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* PRIVACY MODAL */
.privacy-scroll{max-height:75vh;overflow-y:auto;}
.privacy-section{background:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:14px;margin-bottom:12px;}
.privacy-title{font-weight:800;font-size:14px;margin-bottom:6px;}
.privacy-text{font-size:13px;color:rgba(240,244,248,0.65);line-height:1.65;}

/* AD BANNER */
.ad-banner{background:linear-gradient(135deg,rgba(124,58,237,0.08),rgba(245,158,11,0.08));border:1px solid rgba(245,158,11,0.25);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;}

/* FEATURES GRID */
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.feature-card{background:#1F3559;border:1px solid rgba(124,58,237,0.2);border-radius:14px;padding:18px;transition:all 0.2s;cursor:default;}
.feature-card:hover{border-color:rgba(124,58,237,0.5);transform:translateY(-3px);}

/* UPGRADE GRID */
.upgrade-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ══════════════════════════════════════
// DATABASE - localStorage
// ══════════════════════════════════════
var DB = {
  getUsers: function(){ try{ return JSON.parse(localStorage.getItem("bb_users")||"{}"); }catch(e){ return {}; } },
  saveUser: function(email, data){ try{ var u=DB.getUsers(); u[email]=data; localStorage.setItem("bb_users",JSON.stringify(u)); }catch(e){} },
  getUser: function(email){ try{ return DB.getUsers()[email]||null; }catch(e){ return null; } },
  saveSession: function(u){ try{ localStorage.setItem("bb_sess",JSON.stringify(u)); }catch(e){} },
  getSession: function(){ try{ return JSON.parse(localStorage.getItem("bb_sess")||"null"); }catch(e){ return null; } },
  clearSession: function(){ try{ localStorage.removeItem("bb_sess"); }catch(e){} },
  getDailyUsed: function(email){ try{ var k="bb_d_"+email+"_"+new Date().toDateString(); return parseInt(localStorage.getItem(k)||"0"); }catch(e){ return 0; } },
  incDailyUsed: function(email){ try{ var k="bb_d_"+email+"_"+new Date().toDateString(); var n=parseInt(localStorage.getItem(k)||"0")+1; localStorage.setItem(k,n); return n; }catch(e){ return 0; } },
  getMsgs: function(email){ try{ return JSON.parse(localStorage.getItem("bb_msgs_"+email)||"null"); }catch(e){ return null; } },
  saveMsgs: function(email, msgs){ try{ localStorage.setItem("bb_msgs_"+email, JSON.stringify(msgs.slice(-60))); }catch(e){} },
};

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
var state = {
  screen: "loading",
  user: null,
  messages: [],
  input: "",
  loading: false,
  showPayment: false,
  showPrivacy: false,
  error: ""
};

// ══════════════════════════════════════
// IMAGE SEARCH - Wikipedia
// ══════════════════════════════════════
async function searchWikiImage(topic) {
  try {
    var clean = topic.replace(/diagram|picture|image|show me|draw|of|what does|look like|photo|sketch/gi,"").trim();
    if (!clean) return null;
    var url = "https://en.wikipedia.org/w/api.php?action=query&titles="+encodeURIComponent(clean)+"&prop=pageimages&format=json&pithumbsize=400&origin=*";
    var res = await fetch(url);
    var data = await res.json();
    var pages = data.query && data.query.pages;
    if (!pages) return null;
    var page = Object.values(pages)[0];
    return (page && page.thumbnail && page.thumbnail.source) ? page.thumbnail.source : null;
  } catch(e) { return null; }
}

function wantsImage(q) {
  var lower = q.toLowerCase();
  return lower.includes("diagram") || lower.includes("picture") || lower.includes("image") ||
         lower.includes("show me") || lower.includes("draw") || lower.includes("photo") ||
         lower.includes("what does") || lower.includes("look like") || lower.includes("sketch");
}

// ══════════════════════════════════════
// BUILD AI PROMPT
// ══════════════════════════════════════
function buildPrompt(question) {
  var q = question.toLowerCase();

  if (wantsImage(question)) {
    var subject = question.replace(/diagram|picture|image|show me|draw|of|what does|look like|photo|sketch/gi,"").trim();
    return "You are BrainBoost AI for Nigerian students.\nDescribe '"+subject+"' in exactly 3 short sentences. Mention what it looks like and its key features. Do NOT mention images or diagrams. Use emojis. End with: 'Type explain "+subject+" for full details!'";
  }
  if (q.includes("explain") || q.includes("how does") || q.includes("why") || q.includes("in detail") || q.includes("step by step") || q.includes("describe")) {
    return "You are BrainBoost AI for Nigerian students (WAEC, NECO, university).\nGive a DETAILED explanation with steps, examples and emojis.\nEnd with: '✅ This explanation is accurate and unique for you!'\nQuestion: "+question;
  }
  if (q.includes("code") || q.includes("python") || q.includes("javascript") || q.includes("java") || q.includes("program") || q.includes("function")) {
    return "You are BrainBoost AI for Nigerian students.\nWrite COMPLETE working code with comments and example output.\nEnd with: '✅ Copy and run this code!'\nQuestion: "+question;
  }
  if (q.includes("essay") || q.includes("write about") || q.includes("composition")) {
    return "You are BrainBoost AI for Nigerian students.\nWrite a COMPLETE structured essay: Introduction, 3 body paragraphs, Conclusion.\nEnd with: '✅ This essay is unique - safe from plagiarism!'\nQuestion: "+question;
  }
  return "You are BrainBoost AI for Nigerian students.\nGive a SHORT, DIRECT answer in maximum 2-3 sentences. Like a dictionary. No over-explaining.\nUse emojis. End with: '💡 Say explain for more details!'\nQuestion: "+question;
}

// ══════════════════════════════════════
// CALL AI
// ══════════════════════════════════════
async function askAI(question) {
  try {
    var res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: question, prompt: buildPrompt(question) })
    });
    var data = await res.json();
    if (!res.ok) return "❌ Error: " + (data.error || "Please try again!");
    return data.answer;
  } catch(e) {
    return "❌ Connection error! Check your internet.\n\nError: " + e.message;
  }
}

// ══════════════════════════════════════
// SEND MESSAGE
// ══════════════════════════════════════
async function sendMessage() {
  var q = state.input.trim();
  if (!q || state.loading) return;

  var isPro = state.user && (state.user.plan !== "free" || state.user.isOwner);
  var dailyUsed = DB.getDailyUsed(state.user.email);
  if (!isPro && dailyUsed >= 10) {
    state.showPayment = true;
    render();
    return;
  }

  state.messages.push({ role: "user", text: q });
  state.input = "";
  state.loading = true;
  render();

  var imageUrl = null;
  if (wantsImage(q)) {
    imageUrl = await searchWikiImage(q);
  }

  var answer = await askAI(q);
  state.messages.push({ role: "ai", text: answer, image: imageUrl });
  DB.incDailyUsed(state.user.email);
  DB.saveMsgs(state.user.email, state.messages);
  state.loading = false;
  render();

  setTimeout(function(){
    var end = document.getElementById("msgs-end");
    if (end) end.scrollIntoView({ behavior: "smooth" });
  }, 100);
}

// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
function doLogin() {
  var email = (document.getElementById("login-email").value||"").toLowerCase().trim();
  var pw = document.getElementById("login-pw").value||"";
  var err = document.getElementById("login-err");

  if (email === "admin@brainboost.io" && pw === "admin123") {
    var owner = { email: email, name: "Owner", plan: "business", isOwner: true };
    DB.saveSession(owner);
    loginUser(owner);
    return;
  }
  var saved = DB.getUser(email);
  if (!saved) { err.textContent = "❌ Account not found! Sign up first."; return; }
  if (saved.password !== pw) { err.textContent = "❌ Wrong password!"; return; }
  DB.saveSession(saved);
  loginUser(saved);
}

function doSignup() {
  var name = (document.getElementById("signup-name").value||"").trim();
  var email = (document.getElementById("signup-email").value||"").toLowerCase().trim();
  var pw = document.getElementById("signup-pw").value||"";
  var agreed = document.getElementById("signup-agree").checked;
  var err = document.getElementById("signup-err");

  if (!name || !email || !pw) { err.textContent = "Please fill all fields!"; return; }
  if (pw.length < 6) { err.textContent = "Password must be 6+ characters!"; return; }
  if (!agreed) { err.textContent = "Please agree to Privacy Policy first!"; return; }
  if (DB.getUser(email)) { err.textContent = "Account exists! Please log in."; return; }

  var u = { email: email, name: name, plan: "free", isOwner: false, password: pw };
  DB.saveUser(email, u);
  DB.saveSession(u);
  loginUser(u);
}

function loginUser(u) {
  state.user = u;
  var saved = DB.getMsgs(u.email);
  state.messages = saved || [{ role: "ai", text: "Hi " + u.name + "! 👋 I'm BrainBoost AI 🧠\n\nI give SHORT answers by default!\n\n💡 Add 'explain' for full details\n🖼️ Say 'show me diagram of...' for images\n💻 Ask for code in any language\n📝 Ask me to write essays\n\nExamples:\n• 'What is osmosis?'\n• 'Explain photosynthesis'\n• 'Show me diagram of rabbit'\n• 'Write Python code for factorial'\n• 'Essay on climate change'\n\nAsk me anything! 🚀" }];
  state.screen = "chat";
  render();
}

function doLogout() {
  DB.clearSession();
  state.user = null;
  state.messages = [];
  state.screen = "landing";
  render();
}

function clearChat() {
  state.messages = [{ role: "ai", text: "Hi " + state.user.name + "! Chat cleared 🗑️ Ask me anything!" }];
  DB.saveMsgs(state.user.email, state.messages);
  render();
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════

  var root = document.getElementById("root");
  var isPro = state.user && (state.user.plan !== "free" || state.user.isOwner);
  var dailyUsed = state.user ? DB.getDailyUsed(state.user.email) : 0;
  var remaining = isPro ? 9999 : Math.max(0, 10 - dailyUsed);

  var html = "";

  // PRIVACY MODAL
  if (state.showPrivacy) {
    html += `<div class="modal-bg" onclick="if(event.target===this){state.showPrivacy=false;render();}">

    <div style="text-align:center;margin-bottom:20px;">

        ["⚖️","8. Disclaimer","AI answers are for educational guidance only. Verify important information with qualified teachers. We are not responsible for exam results."],
        ["📞","9. Contact","Report misuse: admin@brainboost.io. We respond within 24-48 hours."],
      ].map(function(s){ return `<div class="privacy-section"><div class="privacy-title">${s[0]} ${s[1]}</div><div class="privacy-text">${s[2]}</div></div>`; }).join("")}
    </div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-primary" onclick="state.showPrivacy=false;render();">I Understand ✅</button>
    </div>
  </div>
</div>`;
  }

  // PAYMENT MODAL
  if (state.showPayment) {
    html += `<div class="modal-bg" onclick="if(event.target===this){state.showPayment=false;render();}">
  <div class="modal-box fade-up">
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:40px;margin-bottom:8px;">🧠</div>

    </div>

      <div style="background:#1A2847;border:1px solid rgba(124,58,237,0.5);border-radius:16px;padding:20px;text-align:center;">
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:800;">PRO</div>
        <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#7C3AED;margin:8px 0;">₦5,000</div>
        <div style="font-size:11px;color:rgba(240,244,248,0.4);margin-bottom:14px;">/month</div>
        <div style="font-size:12px;color:#7C3AED;font-weight:700;text-align:left;line-height:2;">✓ Unlimited questions<br/>✓ Any topic<br/>✓ Images & diagrams<br/>✓ No ads</div>
        <button class="btn btn-primary btn-full btn-sm" style="margin-top:14px;" onclick="window.open('https://sandbox.flutterwave.com/pay/diegr3we86xm','_blank')">Pay ₦5,000 →</button>
      </div>
      <div style="background:linear-gradient(160deg,#1A2847,#0a1a35);border:1px solid rgba(245,158,11,0.5);border-radius:16px;padding:20px;text-align:center;">
        <span class="tag" style="background:rgba(245,158,11,0.15);color:#F59E0B;border:1px solid rgba(245,158,11,0.3);">⭐ BEST</span>
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:800;margin-top:8px;">PREMIUM</div>
        <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#F59E0B;margin:8px 0;">₦15,000</div>
        <div style="font-size:11px;color:rgba(240,244,248,0.4);margin-bottom:14px;">/month</div>
        <div style="font-size:12px;color:#F59E0B;font-weight:700;text-align:left;line-height:2;">✓ Everything in Pro<br/>✓ AI Tutor<br/>✓ Priority answers<br/>✓ 24/7 Support</div>
        <button class="btn btn-gold btn-full btn-sm" style="margin-top:14px;" onclick="window.open('https://sandbox.flutterwave.com/pay/oxlzddcromff','_blank')">Pay ₦15,000 →</button>
      </div>
    </div>
    <div style="text-align:center;">
      <button class="btn btn-muted btn-sm" onclick="state.showPayment=false;render();">Maybe Later</button>
    </div>
  </div>
</div>`;
  }

  // SCREENS
  if (state.screen === "loading") {
    html += `<div style="width:100%;height:100vh;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;">
    <div style="font-size:56px;margin-bottom:16px;">🧠</div>
    <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#7C3AED;">BrainBoost</div>
    <div style="font-size:13px;color:rgba(240,244,248,0.4);margin-top:8px;">Loading...</div>
  </div>
</div>`;
  }

  else if (state.screen === "landing") {
    html += `<div class="page">
  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-logo">🧠</div>
      BrainBoost
      <span class="tag" style="background:rgba(245,158,11,0.15);color:#F59E0B;border:1px solid rgba(245,158,11,0.3);font-size:10px;">AI</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost btn-sm" onclick="state.screen='login';render();">Log In</button>
